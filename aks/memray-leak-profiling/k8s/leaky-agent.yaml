apiVersion: v1
kind: Namespace
metadata:
  name: memray-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaky-agent
  namespace: memray-demo
  labels:
    app: leaky-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaky-agent
  template:
    metadata:
      labels:
        app: leaky-agent
    spec:
      containers:
        - name: leaky-agent
          image: acrmemrayb219eb.azurecr.io/leaky-agent:v2
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi          # 누수가 계속되면 결국 OOMKilled 되는 상한
          # 앱 컨테이너에는 SYS_PTRACE 불필요 — ptrace 권한은 kubectl debug 로 붙는
          # 임시(ephemeral) 컨테이너 쪽(--profile=sysadmin)에만 부여한다.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: leaky-agent
  namespace: memray-demo
spec:
  selector:
    app: leaky-agent
  ports:
    - port: 8000
      targetPort: 8000
