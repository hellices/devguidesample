global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Kafka Exporter (Consumer Lag / 토픽·파티션)
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # JMX Exporter (브로커별 JVM / 처리량 / 복제). broker 라벨로 브로커 구분
  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['jmx-b0:9404']
        labels: {broker: '0', broker_host: 'wn0-<BROKER0_IP>'}
      - targets: ['jmx-b1:9404']
        labels: {broker: '1', broker_host: 'wn1-<BROKER1_IP>'}
      - targets: ['jmx-b2:9404']
        labels: {broker: '2', broker_host: 'wn2-<BROKER2_IP>'}
