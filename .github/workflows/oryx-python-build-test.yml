name: Oryx Python 3.11 Build Test

on:
  push:
    paths:
      - 'oryx-test/**'
      - '.github/workflows/oryx-python-build-test.yml'
  workflow_dispatch:

jobs:
  oryx-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull Oryx build image
        run: docker pull mcr.microsoft.com/oryx/build:github-actions-debian-bullseye

      - name: Oryx build Python 3.11
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/oryx-test:/app \
            mcr.microsoft.com/oryx/build:github-actions-debian-bullseye \
            oryx build /app \
              --platform python \
              --platform-version 3.11

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la ./oryx-test/
