# Concurrency benchmark — find optimal batch/concurrency (50 docs, ~5 min)
apiVersion: batch/v1
kind: Job
metadata:
  name: bench-concurrency
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: acrcustomvec01.azurecr.io/bench-runner:latest
          args: ["bench-concurrency"]
          envFrom:
            - configMapRef:
                name: bench-env
          env:
            - name: SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bench-secrets
                  key: SEARCH_API_KEY
            - name: RUN_ID
              value: "conc-test"
            - name: BENCH_DOCS
              value: "50"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
