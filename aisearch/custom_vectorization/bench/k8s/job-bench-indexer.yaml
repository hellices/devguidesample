# Indexer benchmark — AI Search Indexer + SplitSkill + CustomWebApiSkill
apiVersion: batch/v1
kind: Job
metadata:
  name: bench-indexer
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: acrcustomvec01.azurecr.io/bench-runner:latest
          args: ["indexer"]
          envFrom:
            - configMapRef:
                name: bench-env
          env:
            - name: SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bench-secrets
                  key: SEARCH_API_KEY
            - name: RUN_ID
              value: "run1"
            - name: INDEXER_BATCH
              value: "10"
            - name: INDEXER_PARALLEL
              value: "10"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
